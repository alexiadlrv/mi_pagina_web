<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>guipuzkoa</title>
<style>
    h1 { text-align: center; }

    .contenedor {
        position: relative; 
        width: 300px;
        height: 300px;
        margin: 0 auto;
    }

    
    .contenedor img {
        width: 100%;
        height: auto;
        position: absolute;
        top: 0;
        left: 0;
    }

    .primera {
        z-index: 2;
        opacity: 1;
        animation: desaparecer 2s forwards 2s;
    }

   
    .segunda {
        z-index: 1;
        opacity: 0;
        top: 3px;  	
        animation: aparecer 2s forwards 2s; 
    }

    @keyframes desaparecer {
        to { opacity: 0; }
    }

    @keyframes aparecer {
        to { opacity: 1; }
    }
</style>
</head>
<body>
    <h1>GUIPUZKOA</h1>
    <div class="contenedor">
        <img class="primera" src="imagenes/mapaGuipuzkoa.png" alt="Mapa de Guipuzkoa">
        <img class="segunda" src="imagenes/peine.png" alt="Peine">
    </div>
	<a href="../ejercicio3.html">VOLVER</a>
</body>
</html>
